<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Visor clínico móvil</title>
<style>
  :root{--bg:#f6f8fb;--card:#fff;--line:#dde3ea;--text:#17212b;--muted:#5c6b7a;--danger:#b42318;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  .app{max-width:900px;margin:0 auto;padding:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
  h1{font-size:20px;margin:0 0 8px} h2{font-size:15px;margin:0 0 10px}
  .muted{color:var(--muted);font-size:12px;line-height:1.45}
  .ok{color:#1a7f37;font-weight:700}.bad{color:var(--danger);font-weight:700}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input,button{font:inherit}
  input[type="search"],input[type="file"]{width:100%;padding:12px;border-radius:12px;border:1px solid #cfd7e2;background:#fff}
  button{border:1px solid #111827;background:#111827;color:#fff;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer}
  button.secondary{background:#fff;color:#111827}
  .results{display:grid;gap:8px}
  .result{padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer}
  .title{font-weight:800;font-size:15px}.subtitle{font-size:12px;color:var(--muted);margin-top:4px}
  .hidden{display:none!important}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:6px 9px;border:1px solid #dbe4f0;border-radius:999px;background:#fff;font-size:12px}
  .alert-chip{border-color:#f1c0bc;background:#fff2f0;color:var(--danger);font-weight:800}
  .patient-name{font-size:20px;font-weight:900;line-height:1.2}
  .quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .quick-btn{width:100%;text-align:left;padding:12px;border-radius:14px;background:#fff;color:#111827;border:1px solid #d9e3ef}
  .quick-btn.active{background:#111827;color:#fff;border-color:#111827}
  .section{display:none}.section.active{display:block}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 10px;font-size:13px}
  .kv div:nth-child(odd){color:#435264;font-weight:700}
  .block{border:1px solid #e2e8f0;border-radius:12px;padding:12px;background:#fff}
  .list{display:grid;gap:8px}.item{border:1px solid #e7edf4;border-radius:12px;padding:10px;background:#fcfdff}
  .item-title{font-weight:800;font-size:13px}.pre{white-space:pre-wrap;line-height:1.5;font-size:13px}
  table{width:100%;border-collapse:collapse} th,td{border-bottom:1px solid #edf2f7;text-align:left;padding:8px 6px;font-size:12px;vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:#5b6775}
  @media (min-width:860px){.quick-grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="app">
  <div id="homeView">
    <div class="card">
      <h1>Visor clínico móvil</h1>
      <div class="muted">Cargá el JSON exportado para iPhone/iPad desde tu sistema de consultorio.</div>
      <div class="row" style="margin-top:10px">
        <input id="jsonFile" type="file" accept=".json,application/json"/>
      </div>
      <div id="fileMsg" class="muted" style="margin-top:8px">Todavía no cargaste ningún archivo.</div>
    </div>

    <div id="searchCard" class="card hidden">
      <h2>Buscar paciente</h2>
      <input id="searchInput" type="search" placeholder="Apellido, nombre, DNI o afiliado"/>
    </div>

    <div id="resultsCard" class="card hidden">
      <div class="row" style="justify-content:space-between">
        <h2 style="margin:0">Pacientes</h2>
        <div id="resultsCount" class="muted">0</div>
      </div>
      <div id="results" class="results"></div>
    </div>
  </div>

  <div id="patientView" class="hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <button id="backBtn" class="secondary">← Volver</button>
      </div>
      <div id="pName" class="patient-name">—</div>
      <div class="chips">
        <span class="chip">FN: <b id="pDob">—</b></span>
        <span class="chip">Edad: <b id="pAge">—</b></span>
        <span class="chip">DNI: <b id="pDni">—</b></span>
        <span class="chip">OS: <b id="pOs">—</b></span>
        <span class="chip">Afiliado: <b id="pAfi">—</b></span>
        <span class="chip">Tutor: <b id="pTutor">—</b></span>
        <span class="chip">Tel: <b id="pTel">—</b></span>
        <span id="pProblemsChip" class="chip alert-chip hidden">🔴 Problemas activos</span>
      </div>
    </div>

    <div class="card">
      <div class="quick-grid">
        <button class="quick-btn active" data-section="ultimo">Último control</button>
        <button class="quick-btn" data-section="pesos">Pesos</button>
        <button class="quick-btn" data-section="indicaciones">Indicaciones</button>
        <button class="quick-btn" data-section="diagnosticos">Diagnósticos</button>
        <button class="quick-btn" data-section="problemas">Problemas activos</button>
        <button class="quick-btn" data-section="antecedentes">Antecedentes</button>
        <button class="quick-btn" data-section="neonatal">Neonatal</button>
        <button class="quick-btn" data-section="alertas">Alertas</button>
      </div>
    </div>

    <div id="section-ultimo" class="card section active"></div>
    <div id="section-pesos" class="card section"></div>
    <div id="section-indicaciones" class="card section"></div>
    <div id="section-diagnosticos" class="card section"></div>
    <div id="section-problemas" class="card section"></div>
    <div id="section-antecedentes" class="card section"></div>
    <div id="section-neonatal" class="card section"></div>
    <div id="section-alertas" class="card section"></div>
  </div>
</div>

<script>
let db={patients:[],visits:[]}, currentPatient=null;

function safeText(v){return (v===undefined||v===null||v==='')?'—':String(v)}

function parseDateFlexible(s){
  if(!s) return null;
  const str = String(s).trim();
  if(!str) return null;
  const m1 = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m1) return new Date(Number(m1[1]), Number(m1[2])-1, Number(m1[3]));
  const m2 = str.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
  if(m2) return new Date(Number(m2[3]), Number(m2[2])-1, Number(m2[1]));
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function formatDate(s){
  if(!s) return '—';
  const raw = String(s).trim();
  const d=parseDateFlexible(raw);
  if(!d || isNaN(d)) return raw; // muestra la fecha cruda si no puede parsearla
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  return `${dd}/${mm}/${yy}`;
}

function calcAgeText(dobStr){
  const dob=parseDateFlexible(dobStr); if(!dob || isNaN(dob)) return '—';
  const now=new Date();
  let years=now.getFullYear()-dob.getFullYear();
  let months=now.getMonth()-dob.getMonth();
  let days=now.getDate()-dob.getDate();
  if(days<0){ months -= 1; const prev=new Date(now.getFullYear(), now.getMonth(), 0).getDate(); days += prev; }
  if(months<0){ years -= 1; months += 12; }
  if(years===0 && months===0){ return Math.max(0, Math.floor((now-dob)/(1000*60*60*24))) + ' d'; }
  if(years===0){ return days>0 ? months+' m '+days+' d' : months+' m'; }
  return months>0 ? years+' a '+months+' m' : years+' a';
}

function fullName(p){return [p.apellido,p.nombre].filter(Boolean).join(', ') || p.nombre || p.apellido || p.dni || 'Paciente'}
function normalizeDb(raw){
  return {
    patients: Array.isArray(raw?.patients) ? raw.patients : [],
    visits: Array.isArray(raw?.visits) ? raw.visits : []
  };
}
function visitDate(v){ return v.vdate || v.fecha || v.date || ''; }
function getPatientVisits(patient){
  const dni=String(patient.dni||'').trim();
  const pid=String(patient.id||'').trim();
  return (db.visits||[]).filter(v=>{
    return String(v.dni||'').trim()===dni || String(v.patientId||'').trim()===dni || String(v.patientId||'').trim()===pid;
  }).sort((a,b)=>{
    const ta = parseDateFlexible(visitDate(a)); const tb = parseDateFlexible(visitDate(b));
    return (tb?tb.getTime():0) - (ta?ta.getTime():0);
  });
}
function visitWeight(v){
  const x=(v.wt ?? v.peso ?? v.weight);
  return (x===''||x===null||x===undefined||isNaN(Number(x))) ? null : Number(x);
}
function hasText(v){return String(v??'').trim().length>0}
function setHtml(id, html){document.getElementById(id).innerHTML=html}

function renderSearchResults(q=''){
  const resultsEl=document.getElementById('results'); resultsEl.innerHTML='';
  const t=q.trim().toLowerCase();
  let rows=(db.patients||[]).slice();
  if(t){
    rows=rows.filter(p=>[p.apellido,p.nombre,p.dni,p.afiliado,p.os,p.tutor].map(x=>String(x||'').toLowerCase()).join(' ').includes(t));
  }
  document.getElementById('resultsCount').textContent=`${rows.length} paciente${rows.length===1?'':'s'}`;
  if(!rows.length){ resultsEl.innerHTML='<div class="muted">No se encontraron pacientes.</div>'; return; }
  rows.forEach(p=>{
    const visits=getPatientVisits(p), last=visits[0];
    const div=document.createElement('div'); div.className='result';
    div.innerHTML=`<div class="title">${fullName(p)}</div>
      <div class="subtitle">FN ${formatDate(p.dob)} · ${calcAgeText(p.dob)}</div>
      <div class="subtitle">OS: ${safeText(p.os)} · Último control: ${last ? formatDate(visitDate(last)) : '—'}</div>`;
    div.onclick=()=>openPatient(p); resultsEl.appendChild(div);
  });
}

function openPatient(p){
  currentPatient=p;
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('patientView').classList.remove('hidden');
  document.getElementById('pName').textContent=fullName(p);
  document.getElementById('pDob').textContent=formatDate(p.dob);
  document.getElementById('pAge').textContent=calcAgeText(p.dob);
  document.getElementById('pDni').textContent=safeText(p.dni);
  document.getElementById('pOs').textContent=safeText(p.os);
  document.getElementById('pAfi').textContent=safeText(p.afiliado);
  document.getElementById('pTutor').textContent=safeText(p.tutor);
  document.getElementById('pTel').textContent=safeText(p.tel || p.tel1 || p.telefono);
  document.getElementById('pProblemsChip').classList.toggle('hidden', !hasText(p.problemas_activos));
  renderPatientSections(); activateSection('ultimo');
}

function activateSection(name){
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.querySelectorAll('.quick-btn').forEach(b=>b.classList.toggle('active', b.dataset.section===name));
}

function renderPatientSections(){
  const p=currentPatient, visits=getPatientVisits(p), last=visits[0];
  const diagVisits=visits.filter(v=>hasText(v.dx||v.diagnostico)).slice(0,8);
  const planVisits=visits.filter(v=>hasText(v.plan||v.indicaciones)).slice(0,5);
  const weightVisits=visits.filter(v=>visitWeight(v)!==null).slice(0,12);
  const alertVisits=visits.filter(v=>hasText(v.manual_alert||v.alerta||v.alert)).slice(0,8);

  setHtml('section-ultimo', `<h2>Último control</h2>${last ? `<div class="block"><div class="kv">
      <div>Fecha</div><div>${formatDate(visitDate(last))}</div>
      <div>Consulta</div><div>${safeText(last.consulta_tipo || last.consulta_dia || last.motivo)}</div>
      <div>Peso</div><div>${safeText(last.wt)} ${last.wt ? 'kg' : ''}</div>
      <div>Talla</div><div>${safeText(last.ht)} ${last.ht ? 'cm' : ''}</div>
      <div>PC</div><div>${safeText(last.hc)} ${last.hc ? 'cm' : ''}</div>
      <div>Diagnóstico</div><div>${safeText(last.dx)}</div>
      <div>Plan</div><div>${safeText(last.plan)}</div>
    </div></div>` : '<div class="muted">No hay controles cargados.</div>'}`);

  setHtml('section-pesos', `<h2>Últimos pesos</h2>${weightVisits.length ? `<div class="block"><table><thead><tr><th>Fecha</th><th>Peso</th><th>DIF</th></tr></thead><tbody>
      ${weightVisits.map((v,i)=>{ const prev=weightVisits[i+1]; const cur=visitWeight(v); const pr=prev?visitWeight(prev):null; let diff='—'; if(cur!==null && pr!==null){ const d=cur-pr; diff=`${d>=0?'+':''}${d.toFixed(2)} kg`; } return `<tr><td>${formatDate(visitDate(v))}</td><td>${cur!==null?cur+' kg':'—'}</td><td>${diff}</td></tr>`; }).join('')}
    </tbody></table></div>` : '<div class="muted">No hay pesos cargados.</div>'}`);

  setHtml('section-indicaciones', `<h2>Últimas indicaciones</h2>${planVisits.length ? `<div class="list">${planVisits.map(v=>`<div class="item"><div class="item-title">${formatDate(visitDate(v))}</div><div class="pre">${safeText(v.plan || v.indicaciones)}</div></div>`).join('')}</div>` : '<div class="muted">No hay indicaciones cargadas.</div>'}`);
  setHtml('section-diagnosticos', `<h2>Últimos diagnósticos</h2>${diagVisits.length ? `<div class="list">${diagVisits.map(v=>`<div class="item"><div class="item-title">${formatDate(visitDate(v))}</div><div class="pre">${safeText(v.dx || v.diagnostico)}</div></div>`).join('')}</div>` : '<div class="muted">No hay diagnósticos cargados.</div>'}`);
  setHtml('section-problemas', `<h2>Problemas activos</h2><div class="block"><div class="pre">${safeText(p.problemas_activos)}</div></div>`);
  setHtml('section-antecedentes', `<h2>Antecedentes</h2><div class="block"><div class="pre">${safeText(p.obs)}</div></div>`);
  setHtml('section-neonatal', `<h2>Datos neonatales</h2><div class="block"><div class="kv">
    <div>Peso al nacer</div><div>${safeText(p.bw)} ${p.bw ? 'g' : ''}</div>
    <div>Talla</div><div>${safeText(p.neo_talla)} ${p.neo_talla ? 'cm' : ''}</div>
    <div>PC</div><div>${safeText(p.neo_pc)} ${p.neo_pc ? 'cm' : ''}</div>
    <div>EG</div><div>${safeText(p.ga_w)} ${p.ga_w ? 'sem' : ''}</div>
    <div>Apgar 1</div><div>${safeText(p.ap1)}</div>
    <div>Apgar 5</div><div>${safeText(p.ap5)}</div>
    <div>Parto</div><div>${safeText(p.parto)}</div>
  </div></div>`);
  setHtml('section-alertas', `<h2>Alertas</h2>${alertVisits.length ? `<div class="list">${alertVisits.map(v=>`<div class="item"><div class="item-title">${formatDate(visitDate(v))}</div><div class="pre">${safeText(v.manual_alert || v.alerta || v.alert)}</div></div>`).join('')}</div>` : '<div class="muted">No hay alertas manuales cargadas.</div>'}`);
}

document.getElementById('jsonFile').addEventListener('change', async (e)=>{
  const file=e.target.files?.[0]; if(!file) return;
  const msg=document.getElementById('fileMsg');
  try{
    const raw=JSON.parse(await file.text());
    db=normalizeDb(raw);
    document.getElementById('searchCard').classList.remove('hidden');
    document.getElementById('resultsCard').classList.remove('hidden');
    if(!db.patients.length){
      msg.innerHTML='<span class="bad">Archivo cargado, pero no encontré pacientes.</span>';
      renderSearchResults('');
      return;
    }
    msg.innerHTML=`<span class="ok">Archivo cargado:</span> ${file.name}. Pacientes: ${db.patients.length}. Visitas: ${db.visits.length}.`;
    renderSearchResults('');
  }catch(err){
    msg.innerHTML='<span class="bad">No se pudo leer el JSON.</span> ' + (err?.message || '');
  }
});
document.getElementById('searchInput').addEventListener('input', e=>renderSearchResults(e.target.value));
document.getElementById('backBtn').addEventListener('click', ()=>{ currentPatient=null; document.getElementById('patientView').classList.add('hidden'); document.getElementById('homeView').classList.remove('hidden'); });
document.querySelectorAll('.quick-btn').forEach(b=>b.addEventListener('click', ()=>activateSection(b.dataset.section)));
</script>
</body>
</html>
